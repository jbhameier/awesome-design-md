<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#1a241e">
<meta name="description" content="Nutrition goal onboarding screen — pixel recreation.">
<title>Your Goal · Nutrition</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  :root{
    --lime:#cdf24c;
    --lime-soft:#d7f55e;
    --panel-dark:#1a241e;
    --ink-on-lime:#162018;
    --blue:#4fb3e3;
    --orange:#f0a23d;
    --muted:#8d978b;
    --white:#f4f7f1;
    --font:'Poppins',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  }

  html,body{height:100%}
  body{
    font-family:var(--font);
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    background:
      radial-gradient(120% 90% at 70% 8%, #eef5e3 0%, #e6efd6 55%, #dde9c9 100%);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:34px 18px;
  }

  /* ---------- phone frame ---------- */
  .phone{
    position:relative;
    width:100%;
    max-width:430px;
    aspect-ratio:430 / 905;
    border-radius:46px;
    overflow:hidden;
    background:
      radial-gradient(135% 95% at 88% -6%, #5a6f44 0%, #3a4a32 24%, #243029 52%, #1a241e 78%);
    box-shadow:
      0 40px 80px -28px rgba(40,55,30,0.45),
      0 8px 24px -12px rgba(40,55,30,0.30);
    display:flex;
    flex-direction:column;
    padding:30px 26px 26px;
    color:var(--white);
  }
  /* faint concentric ring decoration top-right */
  .phone::before{
    content:"";
    position:absolute;
    top:-120px;right:-150px;
    width:420px;height:420px;
    border-radius:50%;
    border:1.5px solid rgba(205,242,76,0.10);
    box-shadow:0 0 0 60px rgba(205,242,76,0.025);
    pointer-events:none;
  }

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:30px;
  }
  .back{
    width:54px;height:54px;
    border-radius:50%;
    background:rgba(225,235,210,0.07);
    border:1px solid rgba(225,235,210,0.10);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    flex:none;
    transition:background .2s;
  }
  .back:hover,.back:focus-visible{background:rgba(225,235,210,0.13);outline:none}
  .back svg{width:22px;height:22px;stroke:var(--white)}

  .progress{display:flex;align-items:center;gap:9px}
  .progress .dot{
    width:8px;height:8px;border-radius:50%;
    background:rgba(205,242,76,0.30);
  }
  .progress .bar{
    width:36px;height:8px;border-radius:5px;
    background:var(--lime);
  }

  /* ---------- heading ---------- */
  h1{
    font-size:24px;
    line-height:1.25;
    font-weight:700;
    letter-spacing:-0.012em;
    color:var(--white);
    text-align:center;
    margin-bottom:28px;
  }

  /* ---------- Your Goal speech bubble ---------- */
  .goal-wrap{position:relative;margin-bottom:14px}
  .goal{
    background:var(--lime);
    border-radius:26px;
    padding:24px 24px 24px 22px;
    display:flex;
    gap:13px;
    align-items:flex-start;
    box-shadow:0 0 55px rgba(205,242,76,0.22);
  }
  .goal .icon{
    flex:none;
    width:66px;height:66px;
    margin-top:2px;
    display:flex;align-items:center;justify-content:center;
  }
  .goal .icon svg{width:66px;height:66px;fill:#0e1410}
  .goal h2{
    font-size:23px;
    font-weight:700;
    color:var(--ink-on-lime);
    line-height:1;
    margin-bottom:9px;
  }
  .goal p{
    font-size:14.5px;
    line-height:1.42;
    font-weight:500;
    color:#1e2b20;
  }

  /* tail + falling crumbs */
  .tail{
    position:absolute;
    left:64px;bottom:-13px;
    width:34px;height:18px;
    overflow:hidden;
  }
  .tail::before{
    content:"";
    position:absolute;
    top:-14px;left:3px;
    width:24px;height:24px;
    background:var(--lime);
    border-radius:6px;
    transform:rotate(45deg);
  }
  .crumbs{
    position:absolute;
    left:60px;bottom:-44px;
    width:60px;height:36px;
    pointer-events:none;
  }
  .crumbs span{
    position:absolute;
    background:var(--lime);
    border-radius:50%;
    opacity:.85;
  }

  /* ---------- stats card ---------- */
  .stats{
    margin-top:24px;
    background:rgba(232,240,218,0.045);
    border:1px solid rgba(232,240,218,0.05);
    border-radius:28px;
    padding:26px 24px 24px;
  }
  .stats-row{
    display:flex;
    align-items:center;
    gap:22px;
  }
  .ring{
    flex:none;
    position:relative;
    width:172px;height:172px;
  }
  .ring svg{width:100%;height:100%;transform:rotate(-90deg)}
  .ring .center{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;
  }
  .ring .kcal-num{
    font-size:31px;font-weight:700;color:var(--white);
    letter-spacing:-0.01em;line-height:1;
  }
  .ring .kcal-lbl{
    font-size:15px;color:#9aa499;margin-top:5px;font-weight:500;
  }

  .macros{flex:1;display:flex;flex-direction:column;gap:18px;min-width:0}
  .macro .head{
    display:flex;justify-content:space-between;align-items:baseline;
    margin-bottom:9px;
  }
  .macro .name{font-size:17px;font-weight:600;color:var(--white)}
  .macro .val{
    font-size:16px;font-weight:500;color:#cfd6c9;
    font-variant-numeric:tabular-nums;
  }
  .track{
    height:6px;border-radius:6px;
    background:rgba(232,240,218,0.10);
    overflow:hidden;
  }
  .fill{height:100%;border-radius:6px}
  .fill.protein{width:72%;background:var(--blue)}
  .fill.carbs{width:100%;background:var(--lime)}
  .fill.fat{width:96%;background:var(--orange)}

  .stats .caption{
    margin-top:26px;
    text-align:center;
    font-size:15px;
    line-height:1.5;
    font-weight:500;
    color:var(--muted);
    padding:0 6px;
  }

  /* ---------- CTA ---------- */
  .cta{
    margin-top:auto;
    padding-top:30px;
  }
  .cta button{
    width:100%;
    border:none;
    cursor:pointer;
    background:var(--lime);
    color:var(--ink-on-lime);
    font-family:var(--font);
    font-size:19px;
    font-weight:700;
    padding:23px;
    border-radius:40px;
    box-shadow:0 0 45px rgba(205,242,76,0.22);
    transition:transform .15s, background .2s;
  }
  .cta button:hover{background:var(--lime-soft)}
  .cta button:active{transform:scale(.985)}
  .cta button:focus-visible{outline:3px solid #ffffff;outline-offset:3px}

  @media (prefers-reduced-motion:reduce){
    *{transition:none!important}
  }
</style>
</head>
<body>
  <main class="phone">

    <!-- top bar -->
    <div class="topbar">
      <button class="back" aria-label="Go back">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 5l-7 7 7 7"/>
        </svg>
      </button>
      <div class="progress" aria-hidden="true">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
        <span class="bar"></span>
      </div>
    </div>

    <!-- heading -->
    <h1>Stay focused, eat right, and<br>win your journey.</h1>

    <!-- Your Goal speech bubble -->
    <div class="goal-wrap">
      <div class="goal">
        <div class="icon" aria-hidden="true">
          <svg viewBox="0 0 100 100">
            <!-- flag pole + flag -->
            <rect x="56" y="14" width="3.4" height="44" rx="1.5"/>
            <path d="M59 15 L82 21 L59 28 Z"/>
            <!-- person: head -->
            <circle cx="42" cy="26" r="6.2"/>
            <!-- torso -->
            <rect x="39.5" y="32" width="5" height="20" rx="2.5"/>
            <!-- raised arm to pole -->
            <path d="M43 36 L57 30" stroke="#0e1410" stroke-width="4.6" stroke-linecap="round" fill="none"/>
            <!-- other arm -->
            <path d="M41 37 L33 46" stroke="#0e1410" stroke-width="4.6" stroke-linecap="round" fill="none"/>
            <!-- legs -->
            <path d="M42 51 L35 64" stroke="#0e1410" stroke-width="4.8" stroke-linecap="round" fill="none"/>
            <path d="M42 51 L49 64" stroke="#0e1410" stroke-width="4.8" stroke-linecap="round" fill="none"/>
            <!-- rocky mound -->
            <path d="M8 92 Q14 80 22 84 Q27 72 36 80 Q44 70 52 80 Q60 73 70 82 Q80 78 92 92 Z"/>
          </svg>
        </div>
        <div class="txt">
          <h2>Your Goal</h2>
          <p>At the current pace, you&rsquo;ll hit your goal in 23 days! Keep it up!</p>
        </div>
      </div>
      <div class="tail" aria-hidden="true"></div>
      <div class="crumbs" aria-hidden="true">
        <span style="left:24px;top:0;width:6px;height:6px"></span>
        <span style="left:14px;top:7px;width:5px;height:5px"></span>
        <span style="left:33px;top:8px;width:5px;height:5px"></span>
        <span style="left:8px;top:16px;width:4px;height:4px"></span>
        <span style="left:24px;top:17px;width:4px;height:4px"></span>
        <span style="left:40px;top:18px;width:4px;height:4px"></span>
        <span style="left:18px;top:26px;width:3px;height:3px"></span>
        <span style="left:31px;top:27px;width:3px;height:3px"></span>
      </div>
    </div>

    <!-- stats card -->
    <section class="stats">
      <div class="stats-row">
        <div class="ring">
          <svg viewBox="0 0 172 172" aria-hidden="true">
            <circle cx="86" cy="86" r="76" fill="none" stroke="var(--lime)" stroke-width="11"/>
          </svg>
          <div class="center">
            <span class="kcal-num">1281</span>
            <span class="kcal-lbl">kcal</span>
          </div>
        </div>

        <div class="macros">
          <div class="macro">
            <div class="head"><span class="name">Protein</span><span class="val">112 g</span></div>
            <div class="track"><div class="fill protein"></div></div>
          </div>
          <div class="macro">
            <div class="head"><span class="name">Carbs</span><span class="val">225 g</span></div>
            <div class="track"><div class="fill carbs"></div></div>
          </div>
          <div class="macro">
            <div class="head"><span class="name">Fat</span><span class="val">50 g</span></div>
            <div class="track"><div class="fill fat"></div></div>
          </div>
        </div>
      </div>

      <p class="caption">Achieve your goal by Dec 25/2024 with consistent effort and dedication.</p>
    </section>

    <!-- CTA -->
    <div class="cta">
      <button type="button">Go to Dashboard</button>
    </div>

  </main>
</body>
</html>
