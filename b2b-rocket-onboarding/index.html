<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#FFFFFF">
<title>B2B Rocket · Onboarding (Typeform style)</title>
<style>
  :root{
    --brand:#6763D7; --glow:#8A86E6; --accent:#6763D7; --ember:#FF3B30; --ok:#6763D7; --switch-on:#34C759;
    --ink:#0B0B12; --ink-soft:rgba(45,45,55,0.80); --ink-dim:rgba(45,45,55,0.62); --ink-faint:rgba(45,45,55,0.45);
    --sep:rgba(60,60,67,0.22); --fill:rgba(118,118,128,0.12);
    --glass:linear-gradient(180deg,rgba(255,255,255,0.66),rgba(255,255,255,0.42));
    --hair:rgba(255,255,255,0.65); --hair-soft:rgba(60,60,67,0.10);
    --shadow:0 10px 30px rgba(70,64,150,0.13),inset 0 1px 0 rgba(255,255,255,0.7);
    --r-md:14px; --r-lg:20px;
    --font:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,monospace;
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{font-family:var(--font);color:var(--ink);background:#fff;-webkit-font-smoothing:antialiased;letter-spacing:-0.01em}

  .stage{min-height:100dvh;width:100vw;display:grid;place-items:center;background:#fff}
  .app{position:relative;width:100vw;height:100dvh;overflow:hidden;display:flex;flex-direction:column;
    background:linear-gradient(180deg,#FCFBFE 0%,#F4F2FB 100%)}
  @media(min-width:600px){
    .app{width:402px;height:858px;border-radius:54px;box-shadow:0 0 0 12px #16161f,0 0 0 14px #2b2b38,0 40px 120px rgba(0,0,0,.7)}
  }

  .top{display:flex;align-items:center;gap:14px;padding:calc(14px + env(safe-area-inset-top)) 20px 6px;flex-shrink:0}
  .back{appearance:none;width:38px;height:38px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1px solid var(--hair-soft);
    background:rgba(255,255,255,.7);display:grid;place-items:center;opacity:0;pointer-events:none;transition:opacity .25s}
  .back.show{opacity:1;pointer-events:auto}
  .back svg{width:18px;height:18px;fill:none;stroke:var(--ink);stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  .track{flex:1;height:5px;border-radius:99px;background:rgba(103,99,215,.14);overflow:hidden}
  .track b{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,var(--brand),var(--glow));transition:width .45s var(--ease)}

  .deck{position:relative;flex:1;overflow:hidden}
  .q{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;
    padding:8px 24px calc(18px + env(safe-area-inset-bottom));opacity:0;transform:translateY(30px) scale(.99);
    transition:opacity .42s var(--ease),transform .42s var(--ease);pointer-events:none;overflow:hidden}
  .q.active{opacity:1;transform:none;pointer-events:auto}
  .q.up{opacity:0;transform:translateY(-30px) scale(.99)}
  .q.full{justify-content:flex-start;padding-top:6px}

  .eyebrow{font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--brand)}
  h1{font-size:26px;line-height:1.13;font-weight:700;letter-spacing:-0.02em;margin-top:9px}
  .hint{font-size:14px;line-height:1.45;color:var(--ink-dim);margin-top:9px}
  .qfields{margin-top:20px;display:flex;flex-direction:column;gap:13px}
  .opt{color:var(--ink-faint);font-weight:500}
  .req{color:var(--brand)}

  label.fl{display:block;font-size:13px;font-weight:600;color:var(--ink-soft);margin-bottom:7px}
  input,textarea,select{width:100%;font:inherit;font-size:16px;color:var(--ink);background:var(--fill);border:none;border-radius:12px;
    padding:13px 14px;outline:none;transition:box-shadow .15s,background .15s}
  textarea{resize:none;line-height:1.45}
  input::placeholder,textarea::placeholder{color:var(--ink-faint)}
  input:focus,textarea:focus,select:focus{background:#fff;box-shadow:0 0 0 2px var(--brand)}
  select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8' fill='none'><path d='M1 1l5 5 5-5' stroke='%236763D7' stroke-width='1.6' stroke-linecap='round'/></svg>");background-repeat:no-repeat;background-position:right 14px center;padding-right:36px}
  .invalid input,.invalid textarea,input.invalid,textarea.invalid{box-shadow:0 0 0 2px var(--ember)!important}
  .at{display:flex;align-items:center;background:var(--fill);border-radius:12px;overflow:hidden}
  .at:focus-within{background:#fff;box-shadow:0 0 0 2px var(--brand)}
  .at span{padding-left:14px;color:var(--ink-dim);font-family:var(--mono);font-size:15px}
  .at input{background:transparent;box-shadow:none!important}
  .invalid .at{box-shadow:0 0 0 2px var(--ember)}
  .ferr{font-size:12.5px;color:var(--ember);margin-top:8px;display:none}
  .ferr.show{display:block}

  .qfoot{margin-top:22px;display:flex;flex-direction:column;align-items:stretch;gap:9px}
  .btn{appearance:none;border:none;cursor:pointer;font:inherit;font-size:17px;font-weight:600;border-radius:99px;padding:15px;
    background:var(--brand);color:#fff;box-shadow:0 12px 26px rgba(103,99,215,.34);transition:transform .12s var(--ease),opacity .2s}
  .btn:active{transform:scale(.985)}
  .btn[disabled]{opacity:.45;box-shadow:none;cursor:default}
  .btn.ghost{background:rgba(103,99,215,.10);color:var(--brand);box-shadow:none;font-size:15px;padding:13px}
  .hintline{text-align:center;font-size:12px;color:var(--ink-faint)}
  .hintline b{font-weight:600;color:var(--ink-dim)}
  .skip{align-self:center;background:none;border:none;color:var(--ink-dim);font:inherit;font-size:14px;font-weight:600;cursor:pointer;padding:6px}

  .wlogo{display:block;width:auto;max-width:240px;height:auto;margin:0 auto 20px}
  .center{text-align:center}

  .choice{display:flex;flex-direction:column;gap:10px}
  .opt-row{display:flex;align-items:center;gap:12px;padding:15px 18px;cursor:pointer;border-radius:18px;background:var(--glass);
    -webkit-backdrop-filter:blur(18px) saturate(180%);backdrop-filter:blur(18px) saturate(180%);border:1px solid var(--hair);box-shadow:var(--shadow);transition:transform .12s var(--ease)}
  .opt-row:active{transform:scale(.99)}
  .opt-row .otitle{font-size:16px;font-weight:600}
  .opt-row .osub{font-size:12.5px;color:var(--ink-dim);margin-top:2px;font-variant-numeric:tabular-nums}
  .opt-row.sel{background:var(--brand);border-color:transparent}
  .opt-row.sel .otitle{color:#fff}.opt-row.sel .osub{color:rgba(255,255,255,.85)}
  .opt-row .tick{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--sep);flex-shrink:0;display:grid;place-items:center}
  .opt-row.sel .tick{border-color:#fff;background:#fff}
  .opt-row.sel .tick::after{content:"";width:6px;height:11px;border:solid var(--brand);border-width:0 2px 2px 0;transform:rotate(45deg);margin-top:-2px}
  .choice.invalid .opt-row{box-shadow:0 0 0 2px var(--ember)}

  .chips-added{display:flex;flex-wrap:wrap;gap:8px}
  .chips-added:empty{display:none}

  /* count stepper */
  .stepper{display:flex;align-items:center;justify-content:center;gap:22px}
  .stepper button{width:56px;height:56px;border-radius:50%;border:1px solid var(--hair);background:var(--glass);box-shadow:var(--shadow);color:var(--brand);font-size:26px;font-weight:400;line-height:1;cursor:pointer;display:grid;place-items:center}
  .stepper button:active{transform:scale(.94)}
  .stepper .num{font-size:52px;font-weight:700;min-width:64px;text-align:center;font-variant-numeric:tabular-nums}
  .stepper-cap{text-align:center;font-size:13px;color:var(--ink-dim);margin-top:12px}

  /* product peek dots */
  .pdots{display:flex;flex-wrap:wrap;gap:9px;margin-bottom:18px}
  .pdots:empty{display:none}
  .pdot{position:relative;width:34px;height:34px;border-radius:50%;flex-shrink:0;cursor:pointer;border:1.5px dashed var(--sep);
    background:transparent;color:var(--ink-faint);font:inherit;font-size:12px;font-weight:700;display:grid;place-items:center;transition:transform .12s}
  .pdot:active{transform:scale(.92)}
  .pdot.filled{border-style:solid;border-color:transparent;background:rgba(103,99,215,.12);color:var(--brand)}
  .pdot.cur{border-style:solid;border-color:var(--brand);background:var(--brand);color:#fff;box-shadow:0 4px 12px rgba(103,99,215,.4)}
  .pdot .pdl{pointer-events:none}
  .ptip{position:absolute;bottom:calc(100% + 9px);left:50%;transform:translateX(-50%) translateY(4px);
    background:#1b1633;color:#fff;font-size:12px;font-weight:600;padding:7px 11px;border-radius:9px;white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;
    opacity:0;pointer-events:none;transition:opacity .18s,transform .18s;box-shadow:0 8px 22px rgba(20,16,50,.28);z-index:5}
  .ptip::after{content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#1b1633}
  .pdot.show .ptip{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .ptip-nm{display:block;max-width:180px;overflow:hidden;text-overflow:ellipsis}
  .ptip-x{display:block;margin-top:6px;padding-top:6px;border-top:1px solid rgba(255,255,255,.16);color:#FF7A70;font-weight:700;cursor:pointer}
  .pdot:first-child .ptip{left:0;transform:translateX(0) translateY(4px)}
  .pdot:first-child.show .ptip{transform:translateX(0) translateY(0)}
  .pdot:first-child .ptip::after{left:16px}
  .chip{display:inline-flex;align-items:center;gap:8px;background:rgba(103,99,215,.10);color:var(--brand);border-radius:99px;padding:7px 9px 7px 13px;font-size:13px;font-weight:600;max-width:100%}
  .chip span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chip button{border:none;background:rgba(103,99,215,.20);color:var(--brand);width:18px;height:18px;border-radius:50%;cursor:pointer;font-size:12px;line-height:1;flex-shrink:0}

  .chips{display:flex;flex-direction:column;gap:9px}.chips:empty{display:none}
  .conn{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:14px;background:var(--glass);border:1px solid var(--hair);box-shadow:var(--shadow)}
  .conn .logo{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;font-weight:700;font-size:14px;border:1px solid var(--hair-soft)}
  .conn .meta{flex:1;min-width:0}.conn .meta .t{font-size:14px;font-weight:600}.conn .meta .s{font-size:12px;color:var(--ink-dim);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .conn .stat{flex-shrink:0;width:26px;height:26px;border-radius:50%;display:grid;place-items:center;background:rgba(103,99,215,.14);color:var(--ok);font-size:13px}
  .conn .cx{flex-shrink:0;width:26px;height:26px;border-radius:50%;border:none;background:rgba(0,0,0,.05);color:var(--ink-dim);font-size:16px;cursor:pointer}
  .addpill{display:flex;gap:8px}
  .addpill button{flex:1;padding:11px;border-radius:12px;border:1px dashed rgba(103,99,215,.34);background:rgba(103,99,215,.05);color:var(--brand);font:inherit;font-size:13px;font-weight:600;cursor:pointer}

  .switch{appearance:none;width:48px;height:30px;border-radius:99px;background:var(--sep);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
  .switch:checked{background:var(--switch-on)}
  .switch::after{content:"";position:absolute;top:2px;left:2px;width:26px;height:26px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.22);transition:transform .2s}
  .switch:checked::after{transform:translateX(18px)}
  .fwd-row{display:flex;align-items:center;gap:12px;padding:14px;border-radius:14px;background:var(--glass);border:1px solid var(--hair);box-shadow:var(--shadow)}
  .fwd-row>div:first-child{flex:1;min-width:0}
  .fwd-row .t{font-size:14.5px;font-weight:600}.fwd-row .s{font-size:12.5px;color:var(--ink-dim);margin-top:2px;font-family:var(--mono)}

  .dropzone{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:26px 16px;text-align:center;cursor:pointer;
    border:1.5px dashed rgba(103,99,215,.4);border-radius:var(--r-md);background:rgba(103,99,215,.05);transition:transform .12s,background .15s}
  .dropzone:active{transform:scale(.99)}
  .dropzone.full{opacity:.6;cursor:default;border-style:solid;border-color:var(--hair-soft);background:rgba(118,118,128,.06)}
  .dz-ic{font-size:24px}
  .dz-t{font-size:15px;font-weight:600;color:var(--brand)}
  .dropzone.full .dz-t{color:var(--ink-soft)}
  .dz-s{font-size:12px;color:var(--ink-dim)}
  .filelist{display:flex;flex-direction:column;gap:8px;margin-top:14px;max-height:38vh;overflow:auto;scrollbar-width:none}
  .filelist::-webkit-scrollbar{display:none}
  .filelist:empty{display:none}
  .fpill{position:relative;display:flex;align-items:center;gap:11px;padding:11px 12px;border-radius:12px;background:var(--glass);border:1px solid var(--hair);box-shadow:var(--shadow)}
  .fp-ic{font-size:18px;flex-shrink:0}
  .fp-nm{flex:1;min-width:0;font-size:14px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .fp-x{flex-shrink:0;width:28px;height:28px;border-radius:50%;border:none;background:rgba(0,0,0,.05);color:var(--ink-dim);font-size:12px;cursor:pointer;display:grid;place-items:center}
  .fp-x:hover{background:rgba(255,59,48,.14);color:var(--ember)}
  .fp-confirm{display:none;position:absolute;inset:0;align-items:center;gap:8px;padding:0 10px 0 14px;border-radius:12px;
    background:rgba(255,255,255,.95);-webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px)}
  .fpill.confirming .fp-confirm{display:flex}
  .fp-q{flex:1;min-width:0;font-size:13.5px;font-weight:600}
  .fp-no{border:none;background:rgba(118,118,128,.14);color:var(--ink-soft);font:inherit;font-size:13px;font-weight:600;padding:7px 12px;border-radius:99px;cursor:pointer;flex-shrink:0}
  .fp-yes{border:none;background:var(--ember);color:#fff;font:inherit;font-size:13px;font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;flex-shrink:0}

  .split-wrap{max-height:42vh;overflow:auto;scrollbar-width:none}.split-wrap::-webkit-scrollbar{display:none}
  .srow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--hair-soft)}
  .srow:last-child{border-bottom:none}
  .ava{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;background:rgba(103,99,215,.12);color:var(--brand);font-size:12.5px;font-weight:600}
  .sname{font-size:13.5px;font-weight:600;flex-shrink:0;width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .sbar{flex:1;height:7px;border-radius:99px;background:rgba(0,0,0,.07);overflow:hidden}
  .sbar b{display:block;height:100%;background:var(--brand);border-radius:99px;transition:width .2s}
  .spct{width:54px;text-align:center;padding:9px 6px;flex-shrink:0}
  .pctsym{font-size:13px;color:var(--ink-dim);margin-left:-4px}
  .srow.locked .spct{box-shadow:inset 0 0 0 1.5px var(--brand)}
  .srow.locked .sbar b{background:var(--glow)}
  .slock{display:none;flex-shrink:0;width:26px;height:26px;border-radius:50%;border:none;background:rgba(103,99,215,.14);color:var(--brand);cursor:pointer;padding:0;place-items:center}
  .srow.locked .slock{display:grid}
  .slock svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .split-foot{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
  .split-total{font-size:13.5px;font-weight:600}
  .split-reset{border:none;background:rgba(103,99,215,.10);color:var(--brand);font:inherit;font-size:12.5px;font-weight:600;padding:7px 13px;border-radius:99px;cursor:pointer;flex-shrink:0}
  .split-reset:active{transform:scale(.96)}

  .stages{list-style:none;display:flex;flex-direction:column;gap:2px}
  .stages li{display:flex;align-items:center;gap:13px;padding:12px 0;border-bottom:1px solid var(--hair-soft);font-size:14.5px;color:var(--ink-dim);transition:color .3s}
  .stages li:last-child{border-bottom:none}.stages li.run{color:var(--ink)}.stages li.done{color:var(--ink-soft)}
  .stages .dot{width:22px;height:22px;flex-shrink:0;border-radius:50%;border:2px solid var(--sep);position:relative}
  .stages li.run .dot{border-color:transparent;border-top-color:var(--brand);border-right-color:var(--brand);animation:spin .8s linear infinite}
  .stages li.done .dot{border-color:var(--ok);background:var(--ok)}
  .stages li.done .dot::after{content:"";position:absolute;left:6px;top:2.5px;width:5px;height:10px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  @keyframes spin{to{transform:rotate(360deg)}}
  /* section chapters */
  .sect-badge{display:inline-block;font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--brand);background:rgba(103,99,215,.12);padding:6px 14px;border-radius:99px}
  .sect-covers{list-style:none;margin:20px auto 0;max-width:290px;text-align:left;display:flex;flex-direction:column;gap:11px}
  .sect-covers li{position:relative;padding-left:28px;font-size:14.5px;color:var(--ink-soft)}
  .sect-covers li::before{content:"";position:absolute;left:0;top:2px;width:18px;height:18px;border-radius:50%;background:rgba(103,99,215,.15)}
  .sect-covers li::after{content:"";position:absolute;left:6px;top:5px;width:4px;height:8px;border:solid var(--brand);border-width:0 2px 2px 0;transform:rotate(45deg)}
  .rvw-card{background:var(--glass);border:1px solid var(--hair);box-shadow:var(--shadow);border-radius:var(--r-md);padding:4px 16px;max-height:46vh;overflow:auto;scrollbar-width:none}
  .rvw-card::-webkit-scrollbar{display:none}
  .rvw-row{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--hair-soft);font-size:14px}
  .rvw-row:last-child{border-bottom:none}
  .rvw-k{color:var(--ink-dim);flex-shrink:0}
  .rvw-v{font-weight:600;text-align:right;min-width:0;overflow:hidden;text-overflow:ellipsis}
  .rvw-group{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--brand);padding:15px 0 2px}
  .rvw-group:first-child{padding-top:4px}
  .attach-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;border-radius:12px;border:1px dashed rgba(103,99,215,.4);background:rgba(103,99,215,.05);color:var(--brand);font-size:14px;font-weight:600;cursor:pointer}
  .attach-btn.disabled{opacity:.55;cursor:default;border-style:solid;color:var(--ink-dim)}

  .camp-head{display:flex;align-items:center;gap:11px;margin-top:12px}
  .camp-head .ico{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;flex-shrink:0;font-weight:700;font-size:15px}
  .ico.li{background:#0A66C2;color:#fff}.ico.em{background:rgba(103,99,215,.14);color:var(--brand)}
  .camp-head .nm{font-size:16px;font-weight:700}.camp-head .ang{font-size:11.5px;color:var(--ink-dim);margin-top:1px}
  .camp-head .badge{margin-left:auto;font-size:11px;font-weight:600;color:var(--ink-dim);background:rgba(118,118,128,.12);padding:4px 9px;border-radius:99px;white-space:nowrap}
  .swipe{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;gap:12px;margin-top:12px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
  .swipe::-webkit-scrollbar{display:none}
  .slide{flex:0 0 100%;scroll-snap-align:center}
  .slide-card{background:rgba(255,255,255,.55);border:1px solid var(--hair-soft);border-radius:var(--r-md);padding:14px;display:flex;flex-direction:column;height:100%}
  .lh{display:flex;align-items:center;gap:8px;margin-bottom:10px}
  .ln{font-size:13px;font-weight:700}
  .ldelay{font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase;color:var(--brand);background:rgba(103,99,215,.10);padding:3px 8px;border-radius:99px;margin-left:auto;white-space:nowrap}
  .sub-l{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);margin:10px 0 6px}.sub-l:first-of-type{margin-top:0}
  .slide textarea.body{flex:1;min-height:110px}
  .sdots{display:flex;justify-content:center;gap:6px;margin-top:11px}
  .sdots i{width:6px;height:6px;border-radius:50%;background:var(--sep);transition:.25s}.sdots i.on{background:var(--brand);width:18px;border-radius:99px}

  .seal{width:92px;height:92px;border-radius:28px;margin:0 auto 12px;display:grid;place-items:center;background:var(--glass);border:1px solid var(--hair);box-shadow:var(--shadow)}
  .seal svg{width:44px;height:44px;fill:none;stroke:var(--brand);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .tl{position:relative;padding-left:26px;margin-top:16px;text-align:left;max-height:34vh;overflow:auto;scrollbar-width:none}
  .tl::-webkit-scrollbar{display:none}
  .tl::before{content:"";position:absolute;left:7px;top:5px;bottom:5px;width:2px;background:linear-gradient(var(--brand),var(--glow))}
  .tl .pt{position:relative;padding:0 0 15px}.tl .pt:last-child{padding-bottom:0}
  .tl .pt::before{content:"";position:absolute;left:-22px;top:3px;width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid var(--brand)}
  .tl .pt.now::before{background:var(--brand);box-shadow:0 0 0 4px rgba(103,99,215,.18)}
  .tl .when{font-family:var(--mono);font-size:10.5px;color:var(--brand);letter-spacing:.03em}
  .tl .what{font-size:14px;font-weight:600;margin-top:2px}.tl .sub{font-size:12px;color:var(--ink-dim);margin-top:1px;line-height:1.4}

  @media(prefers-reduced-motion:reduce){.q{transition:opacity .15s}.track b,.sbar b{transition:none}}
</style>

  function renderFiles(el,getArr){
    var box=el.querySelector("[data-files]"); if(!box) return; box.innerHTML="";
    var arr=getArr();
    arr.forEach(function(f,i){
      var isImg=/\.(png|jpe?g|gif|webp|heic|heif|bmp|svg)$/i.test(f.name)||/^image\//.test(f.type||"");

        '<button type="button" class="fp-x" data-x aria-label="Remove">✕</button>'+

      (function(pp,idx){

        pp.querySelector("[data-no]").addEventListener("click",function(e){ e.stopPropagation(); pp.classList.remove("confirming"); });
        pp.querySelector("[data-yes]").addEventListener("click",function(e){ e.stopPropagation(); arr.splice(idx,1); renderFiles(el,getArr); });
      })(pill,i);
      box.appendChild(pill);
    });
    var zone=el.querySelector("[data-drop]"), input=zone&&zone.querySelector("input"), full=arr.length>=MAX_FILES;

      rvwRow("Team invites", state.invites.length?(state.invites.length+""):"None");
  }
  function reviewCampaigns(){ return CAMPAIGNS.map(function(c){ return rvwRow(c.nm, "Ready ✓"); }).join(""); }
  // full journey recap, grouped by section — used on the first end screen
  function doneSummary(){
    return '<div class="rvw-group">AI Agent Research</div>'+reviewResearch()+
           '<div class="rvw-group">Infrastructure</div>'+reviewInfra()+
           '<div class="rvw-group">Campaigns</div>'+reviewCampaigns();
  }
  function doneSummaryStep(){
    return { full:true, done:true, build:function(){
      return '<div class="center" style="margin-top:2px"><div class="seal"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M8.2 12.4l2.6 2.6 5-5.4"/></svg></div>'+
        '<p class="eyebrow" style="color:var(--ok)">Onboarding complete</p><h1 style="margin-top:6px">You\'re all set</h1>'+
        '<p class="hint" style="margin-top:8px">Everything your agents are set up with:</p></div>'+
        '<div class="qfields"><div class="rvw-card" data-summary></div></div>'+
        '<div class="qfoot"><button class="btn" data-next>See what happens next</button></div>';
    }, onShow:function(el){ $('[data-summary]',el).innerHTML=doneSummary(); } };
  }

  // reassemble into 3 chapters (welcome first, done last). indices per the push order above.
  var S = STEPS.slice();
  STEPS = [
    S[0],  // welcome
    sectionIntro({n:1, title:"AI Agent Research", blurb:"First, tell us about your business. Your agents read it, research your market, and draft everything they need to sound like you.",
      covers:["Your website & offerings","Any docs to learn from","AI research & knowledge base","Your ideal customer profile"]}),
    S[1], S[2], S[3], S[11], S[12],  // website, count, {products}, research, icp
    sectionReview({eyebrow:"AI Agent Research", title:"Your research, at a glance", blurb:"Here's what your agents will work from.", rows:reviewResearch, cta:"Looks good — continue"}),
    sectionIntro({n:2, title:"Infrastructure", blurb:"Now let's set up how you send — the domains, mailboxes, and accounts your agents send from.",
      covers:["Your sending domain","Volume & mailboxes","Who's sending","Connect accounts & team"]}),
    S[4], S[5], S[6], S[7], S[8], S[9], S[10],  // domain, forwarding, volume, senders, split, connect, team
    sectionReview({eyebrow:"Infrastructure", title:"Your sending setup", blurb:"Everything's ready to send from.", rows:reviewInfra, cta:"Looks good — continue"}),
    sectionIntro({n:3, title:"Campaigns", blurb:"Last step — review the sequences your agents will run and approve each one.",
      covers:["LinkedIn campaign","Three email campaigns","Approve & launch"]}),
    S[13], S[14], S[15], S[16],  // campaigns
    sectionReview({eyebrow:"Campaigns", title:"Ready to launch", blurb:"All your campaigns are set.", rows:reviewCampaigns, cta:"Launch"}),
    doneSummaryStep(),  // end screen 1: everything you set up
    S[17]  // end screen 2: what happens next
  ];

  function renderChips(el,key,labeler){
    var box=$('[data-chips]',el); if(!box) return; box.innerHTML="";
    state[key].forEach(function(item,i){
      var c=document.createElement("span"); c.className="chip";
      c.innerHTML='<span>'+esc(labeler(item))+'</span><button type="button">×</button>';
      c.querySelector("button").addEventListener("click",function(){ state[key].splice(i,1); renderChips(el,key,labeler); });
      box.appendChild(c);
    });
    var cnt=$('[data-count]',el); if(cnt) cnt.textContent=state[key].length;
  }
  function collectorCommit(el,key,reqFields,allFields){
    var vals={}; allFields.forEach(function(f){ vals[f]=($('[data-cf="'+f+'"]',el).value||"").trim(); });
    var anyReq=reqFields.some(function(f){return vals[f];});
    var allReq=reqFields.every(function(f){return vals[f];});
    if(!anyReq) return "empty";
    if(!allReq) return "partial";
    state[key].push(vals);
    allFields.forEach(function(f){ var i=$('[data-cf="'+f+'"]',el); if(i.tagName==="SELECT") i.selectedIndex=1; else i.value=""; });
    return "added";
  }
  function collectorWire(el,key,labeler,allFields){
    var errEl=$('[data-err]',el);
    function showErr(msg){ if(!errEl) return; if(msg) errEl.textContent=msg; errEl.classList.add("show"); }
    $$('[data-cf]',el).forEach(function(inp){ inp.addEventListener("input",function(){ inp.classList.remove("invalid"); if(errEl) errEl.classList.remove("show"); }); });
    var addBtn=$('[data-add]',el);
    if(addBtn) addBtn.addEventListener("click",function(){
      var reqFields = key==="products"?["name","desc"] : key==="senders"?["first","last"] : ["email"];
      var r=collectorCommit(el,key,reqFields,allFields);
      if(r==="added"){ renderChips(el,key,labeler); var f=$('[data-cf]',el); if(f)f.focus(); }
      else if(r==="partial"){ showErr(); }
      else if(r==="empty" && key==="products"){ showErr("Add a name and description."); }
      else if(r==="empty" && key==="senders"){ showErr("Add a first and last name."); }
    });
  }

  function initSplit(n){
    if(state.splitPct.length!==n){
      state.splitPct=[]; state.splitLocked=[];
      var base=Math.floor(100/n), rem=100-base*n;
      for(var i=0;i<n;i++){ state.splitPct.push(base+(i<rem?1:0)); state.splitLocked.push(false); }
    }
  }
  function buildSplit(el){
    var wrap=$('[data-split]',el); wrap.innerHTML="";
    var sn=state.senders.length?state.senders:[{first:"You",last:""}];
    var n=sn.length; initSplit(n);
    sn.forEach(function(p,i){
      var row=document.createElement("div"); row.className="srow"; row.setAttribute("data-i",i);
      row.innerHTML='<span class="ava">'+initials(p.first,p.last)+'</span>'+
        '<span class="sname">'+esc((p.first+" "+(p.last||"")).trim())+'</span>'+
        '<span class="sbar"><b></b></span>'+
        '<input class="spct" type="number" min="0" max="100" inputmode="numeric" value="'+state.splitPct[i]+'">'+
        '<span class="pctsym">%</span>'+
        '<button type="button" class="slock" data-lock title="Locked — tap to unlock"><svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg></button>';
      wrap.appendChild(row);
    });
    $$('.srow',wrap).forEach(function(row){
      var i=+row.getAttribute("data-i"), inp=row.querySelector(".spct");
      inp.addEventListener("input",function(){ editShare(el,i,false); });
      inp.addEventListener("change",function(){ editShare(el,i,true); });
      row.querySelector("[data-lock]").addEventListener("click",function(e){ e.stopPropagation(); state.splitLocked[i]=false; redistribute(el); });
    });
    var rb=$('[data-reset]',el); if(rb) rb.onclick=function(){ resetSplit(el); };
    applySplit(el);
  }
  function editShare(el,i,commit){
    var n=state.splitPct.length; if(!n) return;
    var inp=el.querySelector('.srow[data-i="'+i+'"] .spct');
    if(n===1){ state.splitPct[0]=100; state.splitLocked[0]=false; inp.value=100; applySplit(el); return; }
    state.splitLocked[i]=true;
    var lockedOther=0; for(var j=0;j<n;j++){ if(j!==i && state.splitLocked[j]) lockedOther+=state.splitPct[j]; }
    var raw=parseInt(inp.value,10); if(isNaN(raw))raw=0;
    var maxAllow=Math.max(0,100-lockedOther), v=Math.max(0,Math.min(maxAllow,raw));
    if(commit||raw>maxAllow||raw<0) inp.value=v;
    state.splitPct[i]=v;
    redistribute(el);
  }
  function redistribute(el){
    var n=state.splitPct.length, unlocked=[], lockedSum=0;
    for(var k=0;k<n;k++){ if(state.splitLocked[k]) lockedSum+=state.splitPct[k]; else unlocked.push(k); }
    var remaining=Math.max(0,100-lockedSum);
    if(unlocked.length){ var base=Math.floor(remaining/unlocked.length), rem=remaining-base*unlocked.length; unlocked.forEach(function(u,ii){ state.splitPct[u]=base+(ii<rem?1:0); }); }
    applySplit(el);
  }
  function resetSplit(el){
    var n=state.splitPct.length||1, base=Math.floor(100/n), rem=100-base*n;
    for(var i=0;i<n;i++){ state.splitPct[i]=base+(i<rem?1:0); state.splitLocked[i]=false; }
    applySplit(el);
  }
  function applySplit(el){
    $$('.srow',el).forEach(function(row){
      var i=+row.getAttribute("data-i"), inp=row.querySelector(".spct");
      row.classList.toggle("locked",!!state.splitLocked[i]);
      if(document.activeElement!==inp) inp.value=state.splitPct[i];
      row.querySelector(".sbar b").style.width=state.splitPct[i]+"%";
    });
    var t=state.splitPct.reduce(function(a,v){return a+(+v||0);},0);
    var l=$('[data-total]',el); if(l){ l.textContent="Total — "+t+"%"; l.style.color=(t===100)?"":"var(--ember)"; }
    var rb=$('[data-reset]',el); if(rb) rb.style.visibility = state.splitLocked.some(Boolean)?"visible":"hidden";
  }

  var nodes=[], idx=0, FLOW=[];
  function buildFlow(){
    FLOW=[];
    STEPS.forEach(function(st){
      if(st.expand==="products"){ for(var i=1;i<=state.pcount;i++) FLOW.push(productStep(i,state.pcount)); }
      else FLOW.push(st);
    });
  }
  function render(){
    buildFlow();
    deck.innerHTML=""; nodes=[];
    FLOW.forEach(function(st){
      var q=document.createElement("div"); q.className="q"+(st.full?" full":"");
      q.innerHTML=st.build();
      $$('[data-next]',q).forEach(function(b){ b.addEventListener("click",function(){ advance(nodes.indexOf(q)); }); });
      if(st.after) st.after(q);
      deck.appendChild(q); nodes.push(q);
    });
  }
  function advance(i){
    var st=FLOW[i];
    if(st.validate && !st.validate(nodes[i])){ shake(nodes[i]); return; }
    if(st.commit) st.commit(nodes[i]);
    if(st.rebuildAfter){ render(); show(i+1); return; }  // count changed → regenerate product screens
    if(i>=FLOW.length-1) return;
    show(i+1);
  }
  function show(i){
    i=Math.max(0,Math.min(FLOW.length-1,i)); idx=i;
    nodes.forEach(function(n,k){ n.classList.toggle("active",k===i); n.classList.toggle("up",k<i); });
    var prog = FLOW[i].welcome?0 : (FLOW[i].done?1 : i/(FLOW.length-1));
    bar.style.width=(prog*100)+"%";
    bar.parentNode.style.visibility = (FLOW[i].welcome||FLOW[i].intro) ? "hidden" : "visible";  // hide bar on welcome + section intros
    back.classList.toggle("show", i>0 && !FLOW[i].done);
    if(FLOW[i].onShow) FLOW[i].onShow(nodes[i]);
  }
  function shake(el){ if(rm)return; el.animate([{transform:"translateX(0)"},{transform:"translateX(-7px)"},{transform:"translateX(7px)"},{transform:"translateX(0)"}],{duration:240}); }

  back.addEventListener("click",function(){ if(idx>0){ if(FLOW[idx].commit) FLOW[idx].commit(nodes[idx]); show(idx-1); } });
  document.addEventListener("keydown",function(e){
    if(e.key==="Enter" && e.target.tagName!=="TEXTAREA"){ var b=$('[data-next]',nodes[idx]); if(b&&!b.disabled){ e.preventDefault(); b.click(); } }
  });

  render(); show(0);
})();
</script>
</body>
</html>
